<div class="container">

  <h2>Login</h2>

  <input
    type="text"
    placeholder="Username"
    [(ngModel)]="username">

  <br><br>

  <input
    type="password"
    placeholder="Password"
    [(ngModel)]="password">

  <br><br>

  <button (click)="login()">
    Login
  </button>

   <p>Don't have an account? <a routerLink="/register">Register</a></p>

</div>
